<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabMaster 專業版 | 學測英文</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.1/dist/chart.min.js"></script>

    <style>
        :root {
            --primary-color: #6366f1; --primary-hover: #4f46e5;
            --secondary-color: #10b981; --bg-color: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b;
            --border-color: #e2e8f0; --danger-color: #ef4444;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        /* --- 導覽列 (修復了首頁按鈕) --- */
        .navbar { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(255, 255, 255, 0.98); border-bottom: 1px solid var(--border-color); z-index: 100; }
        .nav-brand { font-size: 1.5em; font-weight: 800; color: var(--primary-color); letter-spacing: -0.5px; }
        .hamburger-btn { display: none; background: none; border: none; font-size: 1.8em; color: var(--text-main); cursor: pointer; padding: 0 5px; }
        .nav-menu { display: flex; gap: 8px; align-items: center; }
        .nav-info { display: flex; align-items: center; gap: 8px; }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-weight: 600; cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: all 0.2s; white-space: nowrap; }
        .nav-btn:hover { background-color: #f8fafc; color: var(--primary-color); }
        .badge { background: #fffbeb; color: #d97706; padding: 4px 10px; border-radius: 12px; font-size: 0.9em; font-weight: 700; white-space: nowrap; }

        /* --- 基礎佈局 --- */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 60px 20px; }
        .view-container { width: 100%; max-width: 650px; text-align: left; animation: fadeIn 0.4s ease-out; }
        .centered-view { text-align: center; max-width: 450px; margin: 0 auto; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 2em; margin-bottom: 15px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .subtitle { color: var(--text-muted); margin-bottom: 25px; line-height: 1.6; }

        /* --- 表單/按鈕 --- */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; color: var(--text-muted); }
        input[type="text"], input[type="password"], input[type="number"], select { width: 100%; padding: 14px 16px; border: 2px solid var(--border-color); border-radius: var(--radius-md); font-size: 1em; background-color: #f8fafc; transition: 0.2s; font-family: inherit; }
        input:focus, select:focus { outline: none; border-color: var(--primary-color); background-color: #fff; }
        
        .typing-input { font-size: 1.5em !important; text-align: center; padding: 20px !important; letter-spacing: 2px; color: var(--primary-color); font-weight: 700;}

        .btn { padding: 14px 24px; border: none; border-radius: var(--radius-md); font-size: 1.05em; font-weight: 600; cursor: pointer; transition: 0.1s; width: 100%; margin-bottom: 12px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: white; color: var(--text-main); border: 2px solid var(--border-color); }
        .btn-success { background-color: var(--secondary-color); color: white; }
        .btn-outline { background: transparent; color: var(--text-muted); padding: 10px; }

        /* --- 測驗 UI --- */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color); }
        .question-card { position: relative; background: #e0e7ff; border: 2px solid #c7d2fe; border-radius: 16px; padding: 40px 20px; margin-bottom: 30px; font-size: 2.2em; font-weight: 800; color: var(--primary-color); word-break: break-word; text-align: center;}
        
        .speak-btn { position: absolute; top: 15px; right: 15px; background: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1.2em; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s; display: flex; justify-content: center; align-items: center;}
        .speak-btn:hover { transform: scale(1.1); color: var(--primary-color); }

        .option-btn { display: block; width: 100%; padding: 16px; margin-bottom: 12px; background: white; border: 2px solid var(--border-color); border-radius: var(--radius-md); text-align: left; font-size: 1.1em; font-weight: 600; cursor: pointer; transition: 0.2s; line-height: 1.4; }
        .option-btn.selected { background-color: var(--primary-color); border-color: var(--primary-color); color: white; }

        /* --- 🃏 Quizlet 級 3D 翻轉閃卡 --- */
        .flashcard-container { width: 100%; height: 300px; perspective: 1000px; cursor: pointer; margin: 20px 0;}
        .flashcard-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .flashcard-container.flipped .flashcard-inner { transform: rotateY(180deg); }
        
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 2px solid var(--border-color); }
        .flashcard-front { background-color: white; color: var(--text-main); }
        .flashcard-back { background-color: #e0e7ff; color: var(--primary-color); transform: rotateY(180deg); border-color: #c7d2fe; }
        
        .fc-word { font-size: 2.5em; font-weight: 800; margin-bottom: 10px; word-break: break-word;}
        .fc-hint { font-size: 0.9em; opacity: 0.6; position: absolute; bottom: 20px; }

        .fc-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .fc-nav-btn { background: white; border: 2px solid var(--border-color); border-radius: 50%; width: 50px; height: 50px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .fc-nav-btn:hover { background: #f8fafc; border-color: var(--primary-color); color: var(--primary-color); }
        .fc-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 傳統列表模式 (隱藏狀態) */
        .review-list-item { background: white; border: 2px solid var(--border-color); padding: 15px; border-radius: var(--radius-md); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}

        /* 排版與表格 */
        .flex-row { display: flex; gap: 15px; }
        .flex-around { display: flex; justify-content: space-around; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, .data-table td { padding: 15px 10px; border-bottom: 1px solid var(--border-color); }

        @media (max-width: 768px) {
            .navbar { padding: 12px 20px; }
            .nav-brand { font-size: 1.3em; }
            .hamburger-btn { display: block; }
            .nav-menu { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: rgba(255, 255, 255, 0.98); flex-direction: column; align-items: stretch; padding: 0 0 15px 0; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
            .nav-menu.show { display: flex; }
            .nav-info { padding: 15px 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 5px; flex-wrap: wrap; background: #f8fafc; }
            .nav-btn { padding: 14px 20px; text-align: left; border-radius: 0; font-size: 1.05em; border-bottom: 1px solid #f1f5f9; }
            .main-content { padding: 30px 15px; }
            h2 { font-size: 1.6em; }
            .flex-row, .flex-around { flex-direction: column; gap: 10px; }
            .question-card { font-size: 1.8em; padding: 30px 15px; }
            .typing-input { font-size: 1.2em !important; padding: 15px !important; }
            .fc-word { font-size: 2em; }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="topNavbar" style="display: none;">
        <div class="nav-brand">VocabMaster</div>
        <button class="hamburger-btn" onclick="document.getElementById('navMenu').classList.toggle('show')">☰</button>
        <div class="nav-menu" id="navMenu">
            <div class="nav-info">
                <span id="navWelcome" style="font-weight: 600; font-size: 0.9em; color: var(--primary-color);"></span>
                <span id="navStreak" class="badge" style="display:none;">🔥 0</span>
                <span id="navMedal" style="font-size:1.2em; display:none;">🥇</span>
            </div>
            <button class="nav-btn" onclick="showView('setupView')">🏠 首頁</button>
            <button class="nav-btn" id="navReviewBtn" onclick="showView('reviewPage')">📚 記憶系統</button>
            <button class="nav-btn" onclick="showView('leaderboardView')">🏆 排行榜</button>
            <button class="nav-btn" id="navProfileBtn" onclick="showView('profileView')">⚙️ 設定</button>
            <button class="nav-btn" style="color: var(--danger-color);" onclick="handleLogout()">登出</button>
        </div>
    </nav>

    <main class="main-content">
        <div id="loginView" class="view-section active view-container centered-view">
            <div style="font-size: 3.5em; margin-bottom: 10px;">🎓</div>
            <h2>登入您的帳號</h2>
            <div class="input-group"><input type="text" id="loginUsername" placeholder="帳號 (Username)" required></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="密碼 (Password)" required></div>
            <button class="btn btn-primary" onclick="handleLogin()">安全登入</button>
            <button class="btn btn-secondary" onclick="showView('registerView')">建立新帳號</button>
            <button class="btn btn-outline" onclick="handleGuestLogin()">先以訪客身分體驗</button>
        </div>
        <div id="registerView" class="view-section view-container centered-view">
            <div style="font-size: 3.5em; margin-bottom: 10px;">✍️</div>
            <h2>建立新帳號</h2>
            <div class="input-group"><input type="text" id="regUsername" placeholder="中英文或數字皆可" required></div>
            <div class="input-group"><input type="password" id="regPassword" placeholder="長度至少 4 碼" required></div>
            <button class="btn btn-primary" onclick="handleRegister()">立即註冊</button>
            <button class="btn btn-outline" onclick="showView('loginView')">返回登入</button>
        </div>

        <div id="setupView" class="view-section view-container">
            <h2>準備開始挑戰</h2>
            <p class="subtitle">選擇您的修練模式，解鎖全新成就！</p>
            
            <div class="input-group">
                <label>測驗模式 🎮</label>
                <select id="quizModeSelect" style="border-color: var(--primary-color); font-weight: 600; color: var(--primary-color);">
                    <option value="1">1. 經典選擇 (英中互譯)</option>
                    <option value="2">2. 進階聽力 (聽英文，選中文)</option>
                    <option value="3">3. 魔王挑戰 (聽發音看提示，手打英文)</option>
                </select>
            </div>

            <div class="flex-row">
                <div class="input-group" style="flex: 1;">
                    <label>題數</label>
                    <input type="number" id="numQuestionsInput" value="10" min="1" max="100">
                </div>
                <div class="input-group" style="flex: 2;">
                    <label>難度級別</label>
                    <select id="difficultySelect">
                        <option value="mixed" selected>🔥 綜合學測比例</option>
                        <option value="3">⭐ Level 3</option>
                        <option value="4">⭐⭐ Level 4</option>
                        <option value="5">⭐⭐⭐ Level 5</option>
                        <option value="6">👑 Level 6</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="startGame(false)" style="margin-top: 10px; padding: 18px; font-size: 1.15em;">🚀 開始測驗</button>
        </div>

        <div id="quizView" class="view-section view-container" style="max-width: 700px;">
            <div class="quiz-header">
                <div id="quizInstruction" style="font-weight: 700; color: var(--primary-color);"></div>
                <div style="font-weight: 600; color: var(--text-muted);"><span id="currentQNum"></span> / <span id="totalQNum"></span></div>
            </div>
            
            <div class="question-card">
                <button id="qSpeakBtn" class="speak-btn" style="display:none;" onclick="playCurrentWordAudio()">🔊</button>
                <div id="meaningDisplay">載入中...</div>
                <div id="hintDisplay" style="display:none; font-size: 0.6em; letter-spacing: 5px; margin-top: 15px; color: var(--text-muted);"></div>
            </div>
            
            <div id="optionsContainer"></div>
            
            <div id="typingContainer" style="display:none;">
                <input type="text" id="typingInput" class="typing-input" placeholder="請拼出完整英文..." autocomplete="off">
            </div>
            
            <div class="flex-row" style="margin-top: 30px;">
                <button id="prevButton" class="btn btn-secondary" style="flex: 1;" onclick="changeQuestion(-1)" disabled>上一題</button>
                <button id="nextButton" class="btn btn-primary" style="flex: 1;" onclick="handleNextQuestion()">下一題</button>
            </div>
        </div>

        <div id="resultView" class="view-section view-container" style="max-width: 800px;">
            <h2>📊 測驗分析報告</h2>
            <p id="summary" style="font-size: 1.2em; font-weight: 800; color: var(--primary-color); margin-bottom: 20px;"></p>
            <div style="width: 200px; height: 200px; margin: 0 auto 30px auto;"><canvas id="scoreChart"></canvas></div>
            <div id="detailResults" style="text-align: left; max-height: 400px; overflow-y: auto; margin-bottom: 20px;"></div>
            <button class="btn btn-primary" onclick="showView('setupView')">返回主頁</button>
        </div>

        <div id="reviewPage" class="view-section view-container" style="max-width: 700px;">
            <h2>🧠 SRS 記憶閃卡</h2>
            
            <div class="flex-row" style="margin-bottom: 20px;">
                <div style="flex:1; background:#fee2e2; padding:15px; border-radius:12px; text-align:center;">
                    <div style="color:#ef4444; font-weight:700;">🔥 今日待複習</div>
                    <div id="dueCountLabel" style="font-size:2em; font-weight:800; color:#b91c1c;">0</div>
                </div>
                <div style="flex:1; background:#f1f5f9; padding:15px; border-radius:12px; text-align:center;">
                    <div style="color:#64748b; font-weight:700;">⏳ 記憶轉換中</div>
                    <div id="pendingCountLabel" style="font-size:2em; font-weight:800; color:#334155;">0</div>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <button id="startReviewBtn" class="btn btn-primary" style="margin:0; flex:2;" onclick="startGame(true)">🗡️ 實戰複習測驗</button>
                <button class="btn btn-secondary" style="margin:0; flex:1;" onclick="toggleFlashcardMode()">切換顯示模式</button>
            </div>

            <div id="flashcardModeContainer">
                <div class="fc-nav">
                    <button class="fc-nav-btn" id="fcPrev" onclick="changeFlashcard(-1)">&lt;</button>
                    <span id="fcCounter" style="font-weight: 600; color: var(--text-muted);">0 / 0</span>
                    <button class="fc-nav-btn" id="fcNext" onclick="changeFlashcard(1)">&gt;</button>
                </div>
                <div id="singleFlashcardArea"></div>
            </div>

            <div id="listModeContainer" style="display: none; max-height: 400px; overflow-y: auto; padding-right: 10px;"></div>
            
        </div>

        <div id="profileView" class="view-section view-container">
            <h2>⚙️ 帳號設定</h2>
            <div class="flex-row" style="align-items: center; margin-bottom: 30px;">
                <div style="font-size: 80px;" id="profileAvatarDisplay">👤</div>
                <div>
                    <h3 id="profileUsernameDisplay" style="color: var(--text-main); font-weight: 800; font-size: 1.5em; margin-bottom: 5px;"></h3>
                    <div id="profileBadgesDisplay" style="font-size: 1.1em;"></div>
                </div>
            </div>
            <div class="input-group">
                <label>更新頭像 (輸入 Emoji 或圖片網址)</label>
                <input type="text" id="newAvatarInput" placeholder="例如: 🚀 或 https://...">
            </div>
            <button class="btn btn-success" onclick="handleAvatarUpdate()">儲存設定</button>
        </div>

        <div id="leaderboardView" class="view-section view-container" style="max-width: 800px;">
            <h2>🏆 全球榮譽榜</h2>
            <div style="overflow-x: auto;"><div id="leaderboardTableContainer"></div></div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyXAx1jgdExUKrNHWpd4v8crV0KI4QXVMGr4Kzht8OG314UfxZKlPbLKlDYc_YqTVM2/exec';
        
        const showLoading = (text) => { Swal.fire({ title: text, allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }}); };
        async function apiCall(action, data = {}) {
            try { return await (await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action, data }) })).json(); } 
            catch (e) { return { success: false, message: "網路異常" }; }
        }

        let quizData = [], currentQuestionIndex = 0, userAnswers = {}, totalQuestions = 0;
        let currentUser = localStorage.getItem('user'), sessionToken = localStorage.getItem('token');
        let isReviewQuizMode = false, activeQuizType = '1'; 

        // --- 🗣️ TTS 原生語音引擎 ---
        function speakWord(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'en-US'; utterance.rate = 0.85; window.speechSynthesis.speak(utterance);
        }
        function playCurrentWordAudio() { speakWord(quizData[currentQuestionIndex].correctWord); }

        // --- 畫面切換 ---
        const VIEW_IDS = ['loginView', 'registerView', 'setupView', 'quizView', 'resultView', 'reviewPage', 'profileView', 'leaderboardView'];
        function showView(viewId) {
            document.getElementById('navMenu').classList.remove('show');
            VIEW_IDS.forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(viewId).classList.add('active');

            if (currentUser) {
                document.getElementById('topNavbar').style.display = 'flex';
                document.getElementById('navWelcome').textContent = currentUser === '訪客' ? '👋 訪客' : `👋 ${currentUser}`;
                const isGuest = currentUser === '訪客';
                document.getElementById('navReviewBtn').style.display = isGuest ? 'none' : 'block';
                document.getElementById('navProfileBtn').style.display = isGuest ? 'none' : 'block';
                if(viewId === 'quizView') document.getElementById('topNavbar').style.display = 'none';
                if (!isGuest && viewId !== 'quizView') updateNavbarBadges();
            } else { document.getElementById('topNavbar').style.display = 'none'; }

            if (viewId === 'reviewPage') loadIncorrectQuestions();
            if (viewId === 'profileView') showProfileView();
            if (viewId === 'leaderboardView') loadLeaderboardData();
            window.scrollTo(0, 0);
        }

        // 登入相關...
        function handleGuestLogin() { Swal.fire({title:'訪客模式', text:'無法解鎖成就與記憶系統', icon:'info', showCancelButton:true}).then(r=>{if(r.isConfirmed){currentUser='訪客';sessionToken=null;localStorage.clear();showView('setupView');}}); }
        function handleRegister() { const u=document.getElementById('regUsername').value; const p=document.getElementById('regPassword').value; if(u.length<3||p.length<4)return Swal.fire('錯誤','帳號>3, 密碼>4','warning'); showLoading('註冊中'); apiCall('registerUser',{username:u, password:p}).then(res=>{if(res.success){Swal.fire('成功','請登入','success');showView('loginView');document.getElementById('loginUsername').value=u;}else Swal.fire('失敗',res.message,'error');}); }
        function handleLogin() { const u=document.getElementById('loginUsername').value; const p=document.getElementById('loginPassword').value; showLoading('登入中'); apiCall('loginUser',{username:u, password:p}).then(res=>{if(res.success){currentUser=res.user;sessionToken=res.token;localStorage.setItem('user',u);localStorage.setItem('token',sessionToken);Swal.close();showView('setupView');}else Swal.fire('失敗',res.message,'error');}); }
        function handleLogout() { Swal.fire({title:'登出？', showCancelButton:true, confirmButtonColor:'#ef4444'}).then(r=>{if(r.isConfirmed){currentUser=null;localStorage.clear();showView('loginView');}}); }

        // --- 魔王模式遮罩小幫手 ---
        function maskWord(word) {
            return word.split(' ').map(w => {
                if (w.length <= 2) return w;
                return w[0] + '_'.repeat(w.length - 2) + w[w.length - 1];
            }).join(' ');
        }

        // --- 開始測驗邏輯 ---
        function startGame(isReview = false) {
            isReviewQuizMode = isReview;
            activeQuizType = isReview ? '1' : document.getElementById('quizModeSelect').value;

            if (isReviewQuizMode) {
                showLoading('生成記憶複習卷...');
                apiCall('getReviewQuestions', { username: currentUser }).then(res => processQuizData(res));
            } else {
                const num = parseInt(document.getElementById('numQuestionsInput').value); const mode = document.getElementById('difficultySelect').value;
                if (isNaN(num) || num < 1) return Swal.fire('錯誤', '題數無效', 'warning');
                showLoading('抽取題目中...');
                apiCall('getAllQuestions', { numQuestions: num, sessionToken: currentUser==='訪客'?null:sessionToken, mode, quizType: activeQuizType }).then(res => processQuizData(res));
            }
        }

        function processQuizData(res) {
            Swal.close();
            if (res.error || !res.success && res.message) { Swal.fire('提示', res.error || res.message, 'info'); return; }
            
            quizData = res.questions;
            totalQuestions = res.totalQuestions;
            if (quizData.length > 0) {
                currentQuestionIndex = 0; userAnswers = {};
                document.getElementById('totalQNum').textContent = totalQuestions;
                document.getElementById('typingInput').value = '';
                showView('quizView'); renderQuestion(0);
            }
        }

        function renderQuestion(index) {
            currentQuestionIndex = index; const q = quizData[index];
            document.getElementById('currentQNum').textContent = index + 1;
            document.getElementById('quizInstruction').textContent = (isReviewQuizMode ? `🧠 記憶覆測：` : '') + q.instruction;
            document.getElementById('meaningDisplay').textContent = q.questionText;
            
            const hintDiv = document.getElementById('hintDisplay');
            if (activeQuizType === '3') {
                hintDiv.style.display = 'block';
                hintDiv.textContent = maskWord(q.correctWord); // 魔王模式給頭給尾
            } else { hintDiv.style.display = 'none'; }
            
            const speakBtn = document.getElementById('qSpeakBtn');
            if (activeQuizType === '2' || activeQuizType === '3') {
                speakBtn.style.display = 'flex';
                setTimeout(() => speakWord(q.correctWord), 500); 
            } else { speakBtn.style.display = 'none'; }

            const optContainer = document.getElementById('optionsContainer');
            const typeContainer = document.getElementById('typingContainer');
            const typeInput = document.getElementById('typingInput');

            if (activeQuizType === '3') {
                optContainer.style.display = 'none'; typeContainer.style.display = 'block';
                typeInput.value = userAnswers[q.id] || '';
                setTimeout(() => typeInput.focus(), 100);
            } else {
                typeContainer.style.display = 'none'; optContainer.style.display = 'block'; optContainer.innerHTML = '';
                q.options.forEach(word => {
                    const btn = document.createElement('button'); btn.className = `option-btn ${userAnswers[q.id] === word ? 'selected' : ''}`; btn.textContent = word;
                    btn.onclick = () => { userAnswers[q.id] = word; Array.from(optContainer.children).forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); };
                    optContainer.appendChild(btn);
                });
            }
            updateNavButtons();
        }

        function handleNextQuestion() {
            if (activeQuizType === '3') { const v = document.getElementById('typingInput').value.trim(); if(v) userAnswers[quizData[currentQuestionIndex].id] = v; }
            changeQuestion(1);
        }
        function changeQuestion(delta) { 
            if (activeQuizType === '3' && delta < 0) userAnswers[quizData[currentQuestionIndex].id] = document.getElementById('typingInput').value.trim();
            const newIdx = currentQuestionIndex + delta; if (newIdx >= 0 && newIdx < quizData.length) renderQuestion(newIdx); 
        }
        function updateNavButtons() {
            const isLast = currentQuestionIndex === quizData.length - 1; document.getElementById('prevButton').disabled = currentQuestionIndex === 0;
            const nextBtn = document.getElementById('nextButton');
            nextBtn.textContent = isLast ? '交卷送出' : '下一題'; nextBtn.onclick = isLast ? submitQuiz : handleNextQuestion; nextBtn.className = isLast ? 'btn btn-success' : 'btn btn-primary';
        }

        function submitQuiz() {
            if (activeQuizType === '3') userAnswers[quizData[currentQuestionIndex].id] = document.getElementById('typingInput').value.trim();
            const unans = quizData.length - Object.keys(userAnswers).length;
            if (unans > 0) Swal.fire({ title: `還有 ${unans} 題未答`, text: '確定交卷？', icon: 'warning', showCancelButton: true }).then(r => { if(r.isConfirmed) processSubmit(); });
            else processSubmit();
        }

        function processSubmit() {
            let correctCount = 0; const submitData = []; const detailDiv = document.getElementById('detailResults'); detailDiv.innerHTML = '';
            quizData.forEach((q, i) => {
                const uAns = userAnswers[q.id]; 
                let isCorr = activeQuizType === '3' ? (uAns && uAns.toLowerCase() === q.correctAnswer.toLowerCase()) : (uAns === q.correctAnswer);
                if (isCorr) correctCount++;
                submitData.push({ questionId: q.id, questionText: q.questionText, userAnswer: uAns, correctAnswer: q.correctAnswer, isCorrect: isCorr });

                detailDiv.innerHTML += `
                    <div style="padding: 15px; border-bottom: 1px solid #e2e8f0; margin-bottom: 10px; background: #f8fafc; border-radius: 8px;">
                        <h4 style="margin-bottom: 8px;">${i+1}. ${q.questionText} <span style="color:${isCorr?'#10b981':'#ef4444'}">${isCorr?'✔':'✘'}</span></h4>
                        <p style="font-size: 0.9em; color: var(--text-muted);">正解: <strong style="color:var(--text-main);">${q.correctAnswer}</strong> ${!isCorr && uAns ? ` | 你答: <span style="color:#ef4444;">${uAns}</span>` : ''}</p>
                    </div>`;
            });

            if (correctCount === totalQuestions && totalQuestions >= 5 && !isReviewQuizMode && currentUser !== '訪客') Swal.fire('太神啦！', '滿分通關！獲得 🥇 榮譽金牌', 'success');
            else if (isReviewQuizMode && correctCount > 0) Swal.fire('記憶升級！', `成功推進了 ${correctCount} 題的進度！`, 'success');

            document.getElementById('summary').textContent = `答對 ${correctCount} 題 / 共 ${totalQuestions} 題`; showView('resultView'); drawChart(correctCount, totalQuestions - correctCount);
            if (currentUser !== '訪客') apiCall('saveQuizResult', { username: currentUser, quizSubmissionData: submitData, isReviewMode: isReviewQuizMode });
        }

        function drawChart(correct, wrong) {
            const ctx = document.getElementById('scoreChart'); if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['答對', '答錯'], datasets: [{ data: [correct, wrong], backgroundColor: ['#6366f1', '#e2e8f0'], borderWidth: 0 }] }, options: { responsive: true, cutout: '75%', plugins: { legend: { display: false } } } });
        }

        // --- 🃏 記憶系統 (Quizlet 閃卡與列表切換) ---
        let reviewCardsData = [];
        let currentFlashcardIndex = 0;
        let showFlashcardMode = true;

        function loadIncorrectQuestions() {
            document.getElementById('flashcardModeContainer').style.display = 'none';
            document.getElementById('listModeContainer').style.display = 'none';
            document.getElementById('startReviewBtn').style.display = 'none';

            apiCall('getIncorrectQuestions', { username: currentUser }).then(res => {
                reviewCardsData = res.questions || [];
                if (reviewCardsData.length > 0) {
                    let dueCount = 0, pendingCount = 0;
                    reviewCardsData.forEach(q => q.isDue ? dueCount++ : pendingCount++);
                    document.getElementById('dueCountLabel').textContent = dueCount;
                    document.getElementById('pendingCountLabel').textContent = pendingCount;
                    if(dueCount > 0) document.getElementById('startReviewBtn').style.display = 'block';

                    currentFlashcardIndex = 0;
                    renderReviewUI();
                } else {
                    document.getElementById('dueCountLabel').textContent = '0'; document.getElementById('pendingCountLabel').textContent = '0';
                    document.getElementById('listModeContainer').style.display = 'block';
                    document.getElementById('listModeContainer').innerHTML = '<p style="text-align:center; padding: 20px; color: var(--text-muted); font-weight: 600;">記憶庫已清空，無錯題紀錄 🎉</p>';
                }
            });
        }

        function toggleFlashcardMode() {
            showFlashcardMode = !showFlashcardMode;
            renderReviewUI();
        }

        function renderReviewUI() {
            if (showFlashcardMode) {
                document.getElementById('listModeContainer').style.display = 'none';
                document.getElementById('flashcardModeContainer').style.display = 'block';
                renderSingleFlashcard();
            } else {
                document.getElementById('flashcardModeContainer').style.display = 'none';
                document.getElementById('listModeContainer').style.display = 'block';
                renderListMode();
            }
        }

        function renderSingleFlashcard() {
            if (reviewCardsData.length === 0) return;
            const q = reviewCardsData[currentFlashcardIndex];
            const area = document.getElementById('singleFlashcardArea');
            
            document.getElementById('fcCounter').textContent = `${currentFlashcardIndex + 1} / ${reviewCardsData.length}`;
            document.getElementById('fcPrev').disabled = currentFlashcardIndex === 0;
            document.getElementById('fcNext').disabled = currentFlashcardIndex === reviewCardsData.length - 1;

            const isQEnglish = /^[a-zA-Z\s\-]+$/.test(q.question);
            const enWord = isQEnglish ? q.question : q.correctAnswer;
            const chWord = isQEnglish ? q.correctAnswer : q.question;
            const stageText = q.stage === 0 ? '🔴 待複習' : q.stage === 1 ? '🟠 1天後' : q.stage === 2 ? '🟡 3天後' : '🟢 7天後';

            area.innerHTML = `
                <div class="flashcard-container" onclick="this.classList.toggle('flipped')" style="opacity: ${q.isDue ? '1' : '0.6'};">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            ${isQEnglish ? `<button class="speak-btn" style="position:absolute; top:15px; right:15px;" onclick="event.stopPropagation(); speakWord('${enWord}')">🔊</button>` : ''}
                            <div class="fc-word">${q.question}</div>
                            <div style="position:absolute; top:15px; left:15px; font-weight:bold; color:var(--text-muted); font-size:0.9em;">${stageText}</div>
                            <div class="fc-hint">點擊翻面</div>
                        </div>
                        <div class="flashcard-back">
                            ${!isQEnglish ? `<button class="speak-btn" style="position:absolute; top:15px; right:15px;" onclick="event.stopPropagation(); speakWord('${enWord}')">🔊</button>` : ''}
                            <div class="fc-word">${q.correctAnswer}</div>
                            ${!q.isDue ? `<div style="font-size:0.8em; margin-top:20px;">解鎖: ${new Date(q.nextReview).toLocaleString()}</div>` : ''}
                        </div>
                    </div>
                </div>`;
        }

        function changeFlashcard(delta) {
            const newIdx = currentFlashcardIndex + delta;
            if (newIdx >= 0 && newIdx < reviewCardsData.length) { currentFlashcardIndex = newIdx; renderSingleFlashcard(); }
        }

        function renderListMode() {
            let html = '';
            reviewCardsData.forEach((q, i) => {
                const stageText = q.stage === 0 ? '🔴 待複習' : q.stage === 1 ? '🟠 1天後' : q.stage === 2 ? '🟡 3天後' : '🟢 7天後';
                html += `
                    <div class="review-list-item" style="opacity: ${q.isDue ? '1' : '0.6'};">
                        <div>
                            <strong style="font-size: 1.1em;">${q.question}</strong> <span style="font-size:0.8em; margin-left:10px; color:var(--text-muted);">${stageText}</span><br>
                            <span style="color:var(--secondary-color); font-weight: 600; display: inline-block; margin-top: 5px;">✅ ${q.correctAnswer}</span>
                        </div>
                    </div>`;
            });
            document.getElementById('listModeContainer').innerHTML = html;
        }

        // 周邊更新
        function updateNavbarBadges() { apiCall('getProfileData', { username: currentUser }).then(res => { if(res.success) { const streakEl = document.getElementById('navStreak'); if (res.streak > 0) { streakEl.style.display = 'inline-block'; streakEl.textContent = `🔥 ${res.streak}`; } document.getElementById('navMedal').style.display = res.hasGoldMedal ? 'inline-block' : 'none'; } }); }
        function showProfileView() { document.getElementById('profileUsernameDisplay').textContent = currentUser; apiCall('getProfileData', { username: currentUser }).then(res => { if (res.success) { const av = res.avatar || '👤'; const avDiv = document.getElementById('profileAvatarDisplay'); if(av.startsWith('http')){ avDiv.innerHTML = `<img src="${av}" style="width:90px; height:90px; border-radius:50%; object-fit:cover;">`; } else { avDiv.textContent = av; } document.getElementById('profileCorrectRate').textContent = res.correctRate; document.getElementById('profileTotalAnswered').textContent = res.totalAnswered; let badgesHtml = ''; if (res.hasGoldMedal) badgesHtml += '<span title="滿分金牌">🥇 金牌得主</span> '; if (res.streak > 0) badgesHtml += `<span class="badge" style="font-size:0.9em;">🔥 ${res.streak} 天連勝</span>`; document.getElementById('profileBadgesDisplay').innerHTML = badgesHtml; } }); }
        function handleAvatarUpdate() { const newAvatar = document.getElementById('newAvatarInput').value.trim(); if(!newAvatar) return Swal.fire('請輸入資料', '', 'info'); showLoading('更新中...'); apiCall('updateAvatar', { username: currentUser, newAvatar }).then(res => { Swal.fire(res.success?'成功':'失敗', res.message, res.success?'success':'error'); if (res.success) showProfileView(); document.getElementById('newAvatarInput').value = ''; }); }
        
        // 🏆 排行榜修復顏色
        function loadLeaderboardData() { 
            const container = document.getElementById('leaderboardTableContainer'); container.innerHTML = '<p>載入中...</p>'; 
            apiCall('getLeaderboardData').then(res => { 
                if(res.data && res.data.length > 0) { 
                    let html = '<table class="data-table"><tr><th>排名</th><th style="text-align:left;">玩家</th><th>答對率</th><th>題數</th></tr>'; 
                    res.data.forEach((d, i) => { 
                        const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1; 
                        // 恢復你原本喜歡的背景色
                        const bgColor = i === 0 ? '#ffedd5' : i === 1 ? '#fef9c3' : i === 2 ? '#e0f2fe' : 'transparent';
                        const medal = d.medal ? '🥇' : ''; 
                        const streak = d.streak > 0 ? `<span style="color:#d97706; font-size:0.8em; font-weight:bold; margin-left:5px;">🔥${d.streak}</span>` : ''; 
                        html += `<tr style="background-color: ${bgColor};">
                            <td style="font-weight:700;">${rank}</td>
                            <td style="text-align:left; font-weight:600; white-space:nowrap;">${d.avatar} ${d.username} ${medal} ${streak}</td>
                            <td style="color:var(--primary-color); font-weight:800;">${d.rateDisplay}</td>
                            <td>${d.totalAns}</td>
                        </tr>`; 
                    }); 
                    container.innerHTML = html + '</table>'; 
                } else { container.innerHTML = '<p>尚無資料</p>'; } 
            }); 
        }

        window.onload = () => { if (currentUser) showView('setupView'); else showView('loginView'); };
    </script>
</body>
</html>
